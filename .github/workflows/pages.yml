name: Publish magna-brain drafts and brain to GitHub Pages

# Publishes output/ (Mehr's drafts) AND output/brain/ (a rendered, browsable
# view of wiki/) to GitHub Pages. Fires on push to main when anything that
# affects the published site changes: drafts, the brain, or the renderer.

on:
  push:
    branches:
      - main
    paths:
      - 'output/**'
      - 'wiki/**'
      - 'tools/**'
      - 'raw/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install renderer dependencies
        run: pip install --quiet markdown

      - name: Render wiki/ to output/brain/
        run: python3 tools/render_brain.py

      - name: Assemble site from output/
        run: |
          mkdir -p _site
          if [ -d output ] && [ -n "$(ls -A output 2>/dev/null)" ]; then
            cp -r output/* _site/ 2>/dev/null || true
          fi
          # Ensure there's always an index.html so the Pages URL never 404s
          if [ ! -f _site/index.html ]; then
            cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en"><head><meta charset="UTF-8"><title>MAGNA — Drafts</title>
          <style>body{background:#2D2D2D;color:#E8DFC8;font-family:system-ui;padding:48px;max-width:720px;margin:0 auto;}
          h1{font-family:Georgia,serif;font-weight:400;}</style></head>
          <body><h1>MAGNA</h1><p>No drafts yet. Ask the brain for one.</p></body></html>
          EOF
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
