<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1e1e1e; color: #E8DFC8; font-family: 'Raleway', sans-serif; min-height: 100vh; }

/* NAV */
nav { background: #181818; border-bottom: 1px solid rgba(155,124,53,0.25); padding: 16px 32px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
.nav-logo { font-family: 'Forum', serif; font-size: 16px; letter-spacing: 0.2em; color: #E8DFC8; }
.nav-title { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(232,223,200,0.4); }
.nav-count { margin-left: auto; font-size: 11px; color: rgba(155,124,53,0.8); letter-spacing: 0.1em; }

/* HEADER */
.header { padding: 40px 32px 28px; border-bottom: 1px solid rgba(155,124,53,0.15); }
.header h1 { font-family: 'Forum', serif; font-size: 28px; font-weight: 400; color: #E8DFC8; margin-bottom: 6px; }
.header p { font-size: 12px; color: rgba(232,223,200,0.4); letter-spacing: 0.08em; }

/* CONTROLS */
.controls { padding: 20px 32px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; background: #1a1a1a; border-bottom: 1px solid rgba(72,60,50,0.5); }
.search-wrap { position: relative; flex: 1; min-width: 220px; max-width: 420px; }
.search-wrap input { width: 100%; background: #242424; border: 1px solid rgba(155,124,53,0.3); color: #E8DFC8; padding: 10px 16px 10px 38px; font-family: 'Raleway', sans-serif; font-size: 13px; outline: none; border-radius: 2px; }
.search-wrap input::placeholder { color: rgba(232,223,200,0.3); }
.search-wrap input:focus { border-color: rgba(155,124,53,0.7); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: rgba(155,124,53,0.6); font-size: 14px; pointer-events: none; }
.filter-select { background: #242424; border: 1px solid rgba(155,124,53,0.3); color: #E8DFC8; padding: 10px 14px; font-family: 'Raleway', sans-serif; font-size: 12px; outline: none; border-radius: 2px; cursor: pointer; }
.filter-select:focus { border-color: rgba(155,124,53,0.7); }
.result-count { font-size: 11px; color: rgba(232,223,200,0.35); letter-spacing: 0.1em; margin-left: auto; }

/* ENGAGEMENT PILLS */
.pill { display: inline-block; padding: 2px 8px; border-radius: 2px; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
.pill-collaboration { background: rgba(155,124,53,0.2); color: #C4A055; border: 1px solid rgba(155,124,53,0.35); }
.pill-education { background: rgba(92,53,24,0.25); color: #B08060; border: 1px solid rgba(92,53,24,0.4); }
.pill-none { color: rgba(232,223,200,0.2); font-size: 10px; }

/* TYPE PILLS */
.type-scale { background: rgba(60,120,60,0.2); color: #7DBF7D; border: 1px solid rgba(60,120,60,0.3); }
.type-growth { background: rgba(60,90,150,0.2); color: #7AADDB; border: 1px solid rgba(60,90,150,0.3); }
.type-launch { background: rgba(120,80,160,0.2); color: #B89FD8; border: 1px solid rgba(120,80,160,0.3); }

/* TABLE */
.table-wrap { overflow-x: auto; padding: 0 32px 60px; }
table { width: 100%; border-collapse: collapse; margin-top: 4px; }
thead th { text-align: left; padding: 12px 16px; font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(155,124,53,0.8); border-bottom: 1px solid rgba(155,124,53,0.2); cursor: pointer; user-select: none; white-space: nowrap; }
thead th:hover { color: #C4A055; }
thead th.sorted-asc::after { content: ' ↑'; color: #C4A055; }
thead th.sorted-desc::after { content: ' ↓'; color: #C4A055; }
tbody tr { border-bottom: 1px solid rgba(72,60,50,0.3); transition: background 0.12s; }
tbody tr:hover { background: rgba(155,124,53,0.06); }
tbody td { padding: 12px 16px; font-size: 12px; vertical-align: middle; }
.td-name { font-weight: 600; color: #E8DFC8; white-space: nowrap; }
.td-role { color: rgba(232,223,200,0.55); font-size: 11px; }
.td-company { color: rgba(232,223,200,0.75); font-weight: 500; }
.td-location { color: rgba(232,223,200,0.45); font-size: 11px; white-space: nowrap; }
.td-industry { color: rgba(232,223,200,0.45); font-size: 11px; max-width: 220px; }
.no-results { text-align: center; padding: 60px 20px; color: rgba(232,223,200,0.25); font-size: 13px; letter-spacing: 0.1em; }

/* HIGHLIGHT */
mark { background: rgba(155,124,53,0.3); color: #E8DFC8; border-radius: 1px; }
</style>

// Populate country filter
const countries = [...new Set(members.map(m => m.country).filter(Boolean))].sort();
const cf = document.getElementById('countryFilter');
countries.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cf.appendChild(o); });

function engagementPill(e, type) {
  if (!e) return '<span class="pill pill-none">—</span>';
  const cls = e.includes('Collaboration') ? 'pill-collaboration' : 'pill-education';
  return `<span class="pill ${cls}">${e.replace('Magna ','')}</span>`;
}
function typePill(t) {
  if (!t) return '';
  const cls = t === 'Scale' ? 'type-scale' : t === 'Growth' ? 'type-growth' : 'type-launch';
  return `<span class="pill ${cls}">${t}</span>`;
}
function highlight(text, query) {
  if (!query || !text) return text || '';
  const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return String(text).replace(regex, '<mark>$1</mark>');
}

let sortCol = 'name', sortDir = 1;
let filtered = [...members];

function render(query) {
  const tbody = document.getElementById('tableBody');
  const noRes = document.getElementById('noResults');
  if (filtered.length === 0) {
    tbody.innerHTML = '';
    noRes.style.display = 'block';
    document.getElementById('resultCount').textContent = '0 results';
    document.getElementById('navCount').textContent = '0 members';
    return;
  }
  noRes.style.display = 'none';
  document.getElementById('resultCount').textContent = filtered.length + ' of ' + members.length;
  document.getElementById('navCount').textContent = filtered.length + ' members';
  tbody.innerHTML = filtered.map(m => `
    <tr>
      <td class="td-name">${highlight(m.name, query)}</td>
      <td class="td-role">${highlight(m.role, query)}</td>
      <td class="td-company">${highlight(m.company, query)}</td>
      <td class="td-location">${highlight(m.city, query)}</td>
      <td class="td-location">${highlight(m.country, query)}</td>
      <td class="td-industry">${highlight(m.industry, query)}</td>
      <td>${engagementPill(m.engagement)}</td>
      <td>${typePill(m.type)}</td>
    </tr>`).join('');
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const country = document.getElementById('countryFilter').value;
  const eng = document.getElementById('engagementFilter').value;
  filtered = members.filter(m => {
    const matchQ = !q || [m.name, m.role, m.company, m.city, m.country, m.industry].some(v => v && v.toLowerCase().includes(q));
    const matchC = !country || m.country === country;
    const matchE = !eng || m.engagement === eng;
    return matchQ && matchC && matchE;
  });
  filtered.sort((a, b) => {
    const av = (a[sortCol] || '').toLowerCase();
    const bv = (b[sortCol] || '').toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
  render(q);
}

// Sort headers
document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortDir *= -1; } else { sortCol = col; sortDir = 1; }
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted-asc','sorted-desc'));
    th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
    applyFilters();
  });
});

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('countryFilter').addEventListener('change', applyFilters);
document.getElementById('engagementFilter').addEventListener('change', applyFilters);

applyFilters();
</script>
